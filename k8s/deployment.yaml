apiVersion: apps/v1
kind: Deployment
metadata:
  name: who-is-your-bff
  labels:
    app: who-is-your-bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: who-is-your-bff
  template:
    metadata:
      labels:
        app: who-is-your-bff
    spec:
      containers:
        - name: who-is-your-bff
          image: who-is-your-bff:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
